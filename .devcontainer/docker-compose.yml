services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: black-swan-radar-app
    restart: unless-stopped
    volumes:
      - ..:/workspace:cached
      - black-swan-radar-m2:/root/.m2
    env_file:
      - ../.env
    working_dir: /workspace
    command: sleep infinity
    environment:
      DOCKER_HOST: ${DOCKER_HOST:-unix:///var/run/docker.sock}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: black-swan-radar-postgres
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  black-swan-radar-m2:
  postgres_data:
